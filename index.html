<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anamnez Tanı Asistanı - Gelişmiş Teşhis Sistemi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-light: #eff6ff;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --radius: 18px;
            --safe-bottom: max(16px, env(safe-area-inset-bottom));
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg);
            margin: 0; 
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        #app-container { 
            width: 100%; 
            max-width: 500px; 
            background: var(--surface);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .progress-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: #f1f5f9; z-index: 50;
        }
        .progress-bar {
            height: 100%; background: var(--primary); width: 0%;
            transition: width 0.4s ease;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            padding-top: calc(30px + env(safe-area-inset-top));
            scrollbar-width: none;
        }

        .header-section { margin-bottom: 1.5rem; }
        .title { font-size: 1.4rem; font-weight: 800; margin: 0 0 8px 0; color: #1e293b; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; line-height: 1.4; }

        .cluster-tag {
            display: inline-block;
            padding: 4px 10px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 30px; }

        .option-card {
            background: #fff;
            border: 2px solid #f1f5f9;
            padding: 16px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .option-card.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .footer-nav {
            padding: 16px 20px;
            padding-bottom: calc(var(--safe-bottom) + 10px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            gap: 10px;
            background: white;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .btn-prev { background: #f1f5f9; color: #475569; flex: 0 0 60px; }
        .btn-next { background: var(--primary); color: white; }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        .result-item {
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        .match-badge {
            position: absolute; right: 0; top: 0;
            padding: 4px 12px; font-size: 0.7rem; font-weight: 900;
            background: var(--primary); color: white; border-bottom-left-radius: 12px;
        }

        #loader {
            position: fixed; inset: 0; background: #fff; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f4f6; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: 600; color: #64748b;">Klinik Veriler Yükleniyor...</p>
</div>

<div id="app-container">
    <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
    <div id="view-content" class="content-area"></div>
    <div id="nav-footer" class="footer-nav"></div>
</div>

<script>
    let db = null;
    let step = 0;
    let answers = {};
    let allData = [];

    // Veritabanı hücrelerini kapsayan genişletilmiş soru akışı
    const workflow = [
        {
            id: "demografik",
            cluster: "Profil",
            title: "Hasta Profili",
            desc: "Demografik veriler tanı olasılıklarını daraltır.",
            options: [
                { val: "Çocuk", label: "Çocuk / Bebek", key: "Görüldüğü Yaş Aralığı" },
                { val: "Genç", label: "Genç Erişkin", key: "Görüldüğü Yaş Aralığı" },
                { val: "Erişkin", label: "Orta Yaş / Erişkin", key: "Görüldüğü Yaş Aralığı" },
                { val: "Yaşlı", label: "Yaşlı", key: "Görüldüğü Yaş Aralığı" },
                { val: "Erkek", label: "Erkek", key: "Cinsiyet" },
                { val: "Kadın", label: "Kadın", key: "Cinsiyet" }
            ]
        },
        {
            id: "lokalizasyon",
            cluster: "Bölge",
            title: "Lezyonun Yerleşimi",
            desc: "Anatomik lokalizasyon ayırıcı tanıda kritiktir.",
            options: [
                { val: "Dil", label: "Dil (Dorsum, Lateral, Ventral)", key: "Lokalizasyon" },
                { val: "Damak", label: "Sert / Yumuşak Damak", key: "Lokalizasyon" },
                { val: "Dudak", label: "Dudak Mukozası / Vermilyon", key: "Lokalizasyon" },
                { val: "Dişeti", label: "Gingiva (Dişeti)", key: "Lokalizasyon" },
                { val: "Yanak", label: "Bukkal Mukoza", key: "Lokalizasyon" },
                { val: "Taban", label: "Ağız Tabanı", key: "Lokalizasyon" },
                { val: "Komisür", label: "Ağız Köşesi (Komisür)", key: "Lokalizasyon" }
            ]
        },
        {
            id: "klinik_karakter",
            cluster: "Görünüm",
            title: "Temel Klinik Karakter",
            desc: "Lezyonun fiziksel yapısını nasıl tanımlarsınız?",
            options: [
                { val: "Beyaz", label: "Beyaz / Keratotik / Plak", key: "Klinik Özellikleri" },
                { val: "Kırmızı", label: "Kırmızı / Eritematöz", key: "Klinik Özellikleri" },
                { val: "Ülser", label: "Ülserasyon / Erozyon / Atrofi", key: "Klinik Özellikleri" },
                { val: "Vezikül", label: "Vezikül / Bül / Kabarcık", key: "Klinik Özellikleri" },
                { val: "Pigment", label: "Kahverengi / Siyah / Mor (Pigmente)", key: "Klinik Özellikleri" },
                { val: "Sarı", label: "Sarımsı / Püstüler", key: "Klinik Özellikleri" }
            ]
        },
        {
            id: "morfoloji",
            cluster: "Morfoloji",
            title: "Yüzey ve Yapı",
            desc: "Lezyonun yüzey dokusu ve büyüme şekli.",
            options: [
                { val: "Ekzofitik", label: "Dışa Doğru Büyüyen (Ekzofitik)", key: "Klinik Özellikleri" },
                { val: "Endofitik", label: "İçe Doğru Çökük (Endofitik)", key: "Klinik Özellikleri" },
                { val: "Saplı", label: "Saplı (Pedünküllü)", key: "Klinik Özellikleri" },
                { val: "Geniş tabanlı", label: "Geniş Tabanlı (Sesil)", key: "Klinik Özellikleri" },
                { val: "Verriköz", label: "Karnabahar / Siğil Benzeri", key: "Klinik Özellikleri" },
                { val: "Fissür", label: "Yarık / Çatlak Tarzında", key: "Klinik Özellikleri" }
            ]
        },
        {
            id: "semptomlar",
            cluster: "Semptom",
            title: "Eşlik Eden Şikayetler",
            desc: "Hastanın subjektif deneyimi nedir?",
            options: [
                { val: "Asemptomatik", label: "Şikayet Yok (Tesadüfi)", key: "Semptomları" },
                { val: "Ağrı", label: "Ağrı veya Yanma Hissi", key: "Semptomları" },
                { val: "Uyuş", label: "Uyuşukluk (Parestezi)", key: "Semptomları" },
                { val: "Kanam", label: "Kolayca Kanama", key: "Semptomları" },
                { val: "Koku", label: "Kötü Koku (Halitosis)", key: "Semptomları" },
                { val: "Disvaji", label: "Yutma Güçlüğü", key: "Semptomları" }
            ]
        },
        {
            id: "radyoloji",
            cluster: "Görüntüleme",
            title: "Radyolojik Bulgular",
            desc: "Eğer varsa, radyolojik gruptaki baskın özellik.",
            options: [
                { val: "YOK", label: "Radyolojik Bulgu Yok", key: "Radyolojik Görüntü Özellikleri" },
                { val: "Radyolüsent", label: "Koyu Alan (Radyolüsent)", key: "Radyolojik Görüntü Özellikleri" },
                { val: "Radyoopak", label: "Beyaz Alan (Radyoopak)", key: "Radyolojik Görüntü Özellikleri" },
                { val: "Miks", label: "Karışık (Miks Yapı)", key: "Radyolojik Görüntü Özellikleri" },
                { val: "Sınır", label: "Sınırları Belirgin", key: "Radyolojik Görüntü Özellikleri" },
                { val: "İnvaziv", label: "Sınırları Belirsiz / Düzensiz", key: "Radyolojik Görüntü Özellikleri" }
            ]
        },
        {
            id: "etiyoloji",
            cluster: "Hikaye",
            title: "Olası Hazırlayıcı Faktörler",
            desc: "Lezyonun başlangıcına ne sebep olmuş olabilir?",
            options: [
                { val: "Travma", label: "Isırma / Protez Vurması / Keskin Diş", key: "Etiyolojisi" },
                { val: "Sigara", label: "Sigara / Tütün Kullanımı", key: "Etiyolojisi" },
                { val: "Alkol", label: "Alkol Tüketimi", key: "Etiyolojisi" },
                { val: "Enfeksiyon", label: "Bakteriyel / Viral / Mantar", key: "Etiyolojisi" },
                { val: "Genetik", label: "Ailevi / Kalıtımsal Geçiş", key: "Etiyolojisi" },
                { val: "İdiyopatik", label: "Nedeni Bilinmeyen", key: "Etiyolojisi" }
            ]
        }
    ];

    async function setup() {
        try {
            const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
            const response = await fetch('TANISIST..db');
            const buf = await response.arrayBuffer();
            db = new SQL.Database(new Uint8Array(buf));

            const tables = ["Kırmızı Lezyonlar", "Yumuşak Doku Kistleri", "Beyaz Lezyonlar", "Kemik Patolojileri", "Tükürük Bezi Patolojileri"]; 
            
            tables.forEach(t => {
                try {
                    const res = db.exec(`SELECT * FROM "${t}"`);
                    if(res.length) {
                        const cols = res[0].columns;
                        res[0].values.forEach(row => {
                            let obj = { _table: t };
                            cols.forEach((c, i) => obj[c] = row[i]);
                            allData.push(obj);
                        });
                    }
                } catch(e) { /* Tablo yoksa atla */ }
            });

            document.getElementById('loader').style.display = 'none';
            render();
        } catch (err) {
            document.getElementById('loader').innerHTML = "<p>Veritabanı erişim hatası. Lütfen dosyayı kontrol edin.</p>";
        }
    }

    function render() {
        const container = document.getElementById('view-content');
        const footer = document.getElementById('nav-footer');
        const q = workflow[step];
        
        document.getElementById('p-bar').style.width = ((step / workflow.length) * 100) + "%";

        container.innerHTML = `
            <div class="fade-in">
                <span class="cluster-tag">${q.cluster}</span>
                <div class="header-section">
                    <h2 class="title">${q.title}</h2>
                    <p class="subtitle">${q.desc}</p>
                </div>
                <div class="options-grid">
                    ${q.options.map((opt, i) => {
                        const sel = answers[q.id]?.some(a => a.val === opt.val);
                        return `
                            <div class="option-card ${sel ? 'selected' : ''}" onclick="toggle('${q.id}', ${i})">
                                <i data-lucide="${sel ? 'check-circle' : 'circle'}" style="width:20px; height:20px;"></i>
                                ${opt.label}
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `;

        footer.innerHTML = `
            ${step > 0 ? `<button class="btn btn-prev" onclick="move(-1)"><i data-lucide="arrow-left"></i></button>` : ''}
            <button class="btn btn-next" onclick="move(1)" ${!answers[q.id]?.length ? 'disabled' : ''}>
                ${step === workflow.length - 1 ? 'Sonuçları Gör' : 'Devam Et'}
            </button>
        `;
        lucide.createIcons();
        container.scrollTo(0,0);
    }

    function toggle(qId, idx) {
        const opt = workflow.find(q => q.id === qId).options[idx];
        if (!answers[qId]) answers[qId] = [];
        const i = answers[qId].findIndex(a => a.val === opt.val);
        if (i > -1) answers[qId].splice(i, 1);
        else answers[qId].push(opt);
        render();
    }

    function move(dir) {
        if (dir === 1 && step === workflow.length - 1) finish();
        else { step += dir; render(); }
    }

    function finish() {
        document.getElementById('p-bar').style.width = "100%";
        const container = document.getElementById('view-content');
        const footer = document.getElementById('nav-footer');
        
        container.innerHTML = `
            <div class="header-section">
                <h2 class="title">Teşhis Analizi</h2>
                <p class="subtitle">Veritabanı taraması sonucunda en kuvvetli eşleşmeler:</p>
            </div>
            <div id="results-list"></div>
        `;

        const userSelection = Object.values(answers).flat();
        let scores = [];

        allData.forEach(item => {
            let score = 0;
            let hits = [];
            
            userSelection.forEach(ans => {
                const dbValue = String(item[ans.key] || "").toLowerCase();
                const searchValue = ans.val.toLowerCase();
                
                if (dbValue.includes(searchValue)) {
                    score += 20; 
                    hits.push(ans.label);
                }
            });

            // Özel Benzetme ve Notlar taraması (Bonus Puan)
            const globalText = JSON.stringify(item).toLowerCase();
            userSelection.forEach(ans => {
                if (globalText.includes(ans.val.toLowerCase()) && !hits.includes(ans.label)) {
                    score += 5;
                }
            });

            if (score > 15) { // Minimum eşleşme barajı
                scores.push({ ...item, totalScore: score, hits });
            }
        });

        scores.sort((a, b) => b.totalScore - a.totalScore);
        const list = document.getElementById('results-list');

        if(scores.length === 0) {
            list.innerHTML = `<p style="text-align:center; color:gray; margin-top:40px;">Kriterlere tam uyan bir tanı bulunamadı.</p>`;
        } else {
            scores.slice(0, 10).forEach(s => {
                const div = document.createElement('div');
                div.className = 'result-item fade-in';
                div.innerHTML = `
                    <div class="match-badge">%${Math.min(s.totalScore, 100)} Uyum</div>
                    <div style="font-weight:800; color:var(--primary); font-size:1.1rem; padding-right:60px;">${s["Tanı Adı"] || 'İsimsiz Tanı'}</div>
                    <div style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; margin-bottom:10px;">Grup: ${s._table}</div>
                    
                    <div style="font-size:0.85rem; line-height:1.4; color:#334155;">
                        <strong>Klinik:</strong> ${s["Klinik Özellikleri"]?.substring(0, 120) || 'Veri yok'}...
                    </div>
                    
                    ${s["Özel Benzetmesi"] ? `
                        <div style="background:#fff7ed; padding:8px; border-radius:8px; margin:10px 0; border:1px dashed #fdba74; font-size:0.8rem;">
                            <strong>Benzetme:</strong> ${s["Özel Benzetmesi"]}
                        </div>
                    ` : ''}

                    <div style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px;">
                        ${s.hits.map(h => `<span style="font-size:0.65rem; background:#f1f5f9; padding:3px 8px; border-radius:6px; color:#475569;">${h}</span>`).join('')}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        footer.innerHTML = `<button class="btn btn-next" onclick="location.reload()">Sıfırla ve Yeniden Başla</button>`;
        lucide.createIcons();
    }

    window.onload = setup;
</script>

</body>
</html>
