<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tanı Sistemi - Klinik Karar Destek</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root { 
            --primary: #0284c7; 
            --primary-dark: #0369a1;
            --accent: #f59e0b;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); margin: 0; height: 100vh;
            color: var(--text-main); overflow: hidden; display: flex; justify-content: center;
        }

        #app-container { 
            width: 100%; max-width: 500px; background: var(--surface);
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        .step-indicator {
            position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: #e2e8f0; z-index: 50;
        }
        .step-progress {
            height: 100%; background: var(--primary); width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .content-area {
            flex: 1; overflow-y: auto; padding: 24px;
            padding-top: calc(40px + env(safe-area-inset-top));
            scrollbar-width: none;
        }

        .cluster-header {
            display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
        }
        .cluster-tag {
            background: #e0f2fe; color: #0369a1; padding: 4px 10px;
            border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
        }

        .question-title { font-size: 1.5rem; font-weight: 800; line-height: 1.2; margin: 0 0 10px 0; }
        .question-desc { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 24px; }

        .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }

        .option-item {
            border: 2px solid #f1f5f9; border-radius: var(--radius);
            padding: 18px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 14px; position: relative;
        }
        .option-item:hover { border-color: #e2e8f0; background: #f8fafc; }
        .option-item.selected { 
            border-color: var(--primary); background: #f0f9ff; 
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.1);
        }

        .check-box {
            width: 22px; height: 22px; border: 2px solid #cbd5e1;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .option-item.selected .check-box {
            background: var(--primary); border-color: var(--primary);
        }
        .option-text { font-weight: 600; font-size: 1rem; color: #334155; }

        .footer {
            padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom));
            border-top: 1px solid #f1f5f9; background: white; display: flex; gap: 12px;
        }

        .btn {
            flex: 1; padding: 18px; border-radius: 14px; font-weight: 700;
            border: none; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 8px; transition: all 0.2s;
        }
        .btn-back { background: #f1f5f9; color: #475569; flex: 0 0 65px; }
        .btn-next { background: var(--primary); color: white; }
        .btn:disabled { opacity: 0.4; filter: grayscale(1); }

        .result-card {
            border: 1px solid #e2e8f0; border-radius: 20px; padding: 20px;
            margin-bottom: 16px; position: relative; background: white;
        }
        .score-badge {
            position: absolute; right: 15px; top: 15px;
            background: #fef3c7; color: #92400e; padding: 4px 10px;
            border-radius: 12px; font-weight: 900; font-size: 0.75rem;
        }

        #loader {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spin { width: 45px; height: 45px; border: 4px solid #f1f5f9; border-top-color: var(--primary); border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }

        .spot-hint {
            display: inline-flex; align-items: center; gap: 5px;
            background: #fff7ed; color: #c2410c; padding: 6px 12px;
            border-radius: 8px; font-size: 0.8rem; font-weight: 600; margin-top: 12px;
            border: 1px solid #ffedd5;
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="spin"></div>
    <p style="margin-top:20px; font-weight:700; color:#475569">Sistem Yapılandırılıyor...</p>
</div>

<div id="app-container">
    <div class="step-indicator"><div class="step-progress" id="progress"></div></div>
    <div id="view" class="content-area"></div>
    <div id="footer" class="footer"></div>
</div>

<script>
    let db = null;
    let step = 0;
    let selections = {};
    let allRecords = [];

    // Verilen listeye göre optimize edilmiş akış
    const workflow = [
        {
            id: "demografik",
            cluster: "Filtreleme",
            title: "Hasta Profili",
            desc: "Yaş ve cinsiyet bazı lezyonları istatistiksel olarak dışlar.",
            options: [
                { val: "Çocuk", label: "Çocuk / Adölesan (10-20)", key: "Görüldüğü Yaş Aralığı" },
                { val: "Genç", label: "Genç Erişkin (20-40)", key: "Görüldüğü Yaş Aralığı" },
                { val: "Erişkin", label: "Orta Yaş (40-60)", key: "Görüldüğü Yaş Aralığı" },
                { val: "Yaşlı", label: "Yaşlı (60+)", key: "Görüldüğü Yaş Aralığı" },
                { val: "Kadın", label: "Kadın", key: "Cinsiyet" },
                { val: "Erkek", label: "Erkek", key: "Cinsiyet" }
            ]
        },
        {
            id: "lokalizasyon",
            cluster: "Konum",
            title: "Lezyon Nerede?",
            desc: "Hücre veritabanındaki lokalizasyon eşleşmeleri aranıyor.",
            options: [
                { val: "Bukkal", label: "Bukkal Mukoza / Yanak", key: "Lokalizasyon" },
                { val: "Dil", label: "Dil (Lateral / Ventral)", key: "Lokalizasyon" },
                { val: "Damak", label: "Sert / Yumuşak Damak", key: "Lokalizasyon" },
                { val: "Dişeti", label: "Dişeti / Jeneralize Büyüme", key: "Lokalizasyon" },
                { val: "Mandibula", label: "Mandibula (Kemik)", key: "Lokalizasyon" },
                { val: "Maksilla", label: "Maksilla (Kemik)", key: "Lokalizasyon" },
                { val: "Taban", label: "Ağız Tabanı / Orta Hat", key: "Lokalizasyon" }
            ]
        },
        {
            id: "etiyoloji",
            cluster: "Öykü",
            title: "Tetikleyici Faktörler",
            desc: "Olası nedenler ve hastanın hayat tarzı.",
            options: [
                { val: "Tütün", label: "Tütün (Sigara/Pipo/Alkol)", key: "Etiyolojisi" },
                { val: "İritasyon", label: "Kronik İritasyon / Protez Vuruğu", key: "Etiyolojisi" },
                { val: "Enfeksiyon", label: "Enfeksiyöz (Mantar/Virüs/Bakteri)", key: "Etiyolojisi" },
                { val: "Genetik", label: "Genetik / Ailevi Öykü", key: "Etiyolojisi" },
                { val: "Hormonal", label: "Hormonal / Sistemik (PTH/T3-T4)", key: "Etiyolojisi" },
                { val: "Vitamin", label: "Vitamin Eksikliği", key: "Etiyolojisi" }
            ]
        },
        {
            id: "semptom",
            cluster: "Şikayet",
            title: "Hasta Ne Hissediyor?",
            desc: "Subjektif semptomlar ve fonksiyon kayıpları.",
            options: [
                { val: "Ağrı", label: "Nevraljik Ağrı / Yanma Hissi", key: "Semptomları" },
                { val: "Ağrısız", label: "Ağrısız Şişlik", key: "Semptomları" },
                { val: "Tat", label: "Metalik Tat Bozukluğu", key: "Semptomları" },
                { val: "Disfaji", label: "Yutma Güçlüğü / Disfaji", key: "Semptomları" },
                { val: "Trismus", label: "Trismus (Ağız Açma Kısıtlılığı)", key: "Semptomları" },
                { val: "Kanama", label: "Spontan Kanama", key: "Semptomları" }
            ]
        },
        {
            id: "klinik",
            cluster: "Muayene",
            title: "Klinik Görünüm",
            desc: "Objektif muayene bulguları ve doku değişimi.",
            options: [
                { val: "Kazınabilen", label: "Kazınabilen Beyaz Plaklar", key: "Klinik Özellikleri" },
                { val: "Kazınamayan", label: "Kazınamayan Beyaz Plaklar", key: "Klinik Özellikleri" },
                { val: "Kadifemsi", label: "Kadifemsi / Kırmızı Yüzey", key: "Klinik Özellikleri" },
                { val: "Hamur", label: "Hamur Kıvamında Kitle", key: "Klinik Özellikleri" },
                { val: "Krut", label: "Kanlı Krutlar (Dudakta)", key: "Klinik Özellikleri" },
                { val: "Pus", label: "Pus (İrin) Çıkışı", key: "Klinik Özellikleri" }
            ]
        },
        {
            id: "radyoloji",
            cluster: "Teknik Terim",
            title: "Görüntüleme Özellikleri",
            desc: "Radyolojik sınırlara ve karakteristiğe odaklanın.",
            options: [
                { val: "Multiloküler", label: "Multiloküler Radyolüsensi", key: "Radyolojik Görüntü Özellikleri" },
                { val: "Güve", label: "Güve Yeniği (Düzensiz Yıkım)", key: "Radyolojik Görüntü Özellikleri" },
                { val: "Scalloping", label: "Scalloping (Kök Arası Uzanım)", key: "Radyolojik Görüntü Özellikleri" },
                { val: "Opak", label: "Radyoopak Kalsifikasyonlar", key: "Radyolojik Görüntü Özellikleri" },
                { val: "Dura", label: "Lamina Dura Kaybı", key: "Radyolojik Görüntü Özellikleri" },
                { val: "Sekestr", label: "Sekestr (Ölü Kemik)", key: "Radyolojik Görüntü Özellikleri" }
            ]
        },
        {
            id: "benzetme",
            cluster: "Spot Bilgi",
            title: "Özel Benzetmeler",
            desc: "Tanı koydurucu karakteristik benzetmeler.",
            options: [
                { val: "Kar fırtınası", label: "Kar Fırtınası (Driven Snow)", key: "Özel Benzetmesi" },
                { val: "Sabun köpüğü", label: "Sabun Köpüğü / Bal Peteği", key: "Özel Benzetmesi" },
                { val: "Süt kesiği", label: "Süt Kesiği / Süzme Peynir", key: "Özel Benzetmesi" },
                { val: "Soğan zarı", label: "Soğan Zarı (Periost Reaksiyonu)", key: "Özel Benzetmesi" },
                { val: "İnci", label: "İnci Tanesi", key: "Özel Benzetmesi" },
                { val: "Hedef", label: "Hedef Tahtası (Bulls-eye)", key: "Özel Benzetmesi" }
            ]
        }
    ];

    async function init() {
        try {
            const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
            const response = await fetch('TANISIST..db');
            const buf = await response.arrayBuffer();
            db = new SQL.Database(new Uint8Array(buf));

            const tableNames = ["Kırmızı Lezyonlar", "Yumuşak Doku Kistleri", "Beyaz Lezyonlar", "Kemik Patolojileri", "Tükürük Bezi Patolojileri"];
            
            tableNames.forEach(tn => {
                try {
                    const res = db.exec(`SELECT * FROM "${tn}"`);
                    if (res.length) {
                        const cols = res[0].columns;
                        res[0].values.forEach(v => {
                            let rec = { _source: tn };
                            cols.forEach((c, i) => rec[c] = v[i]);
                            allRecords.push(rec);
                        });
                    }
                } catch(e) {}
            });

            document.getElementById('loader').style.display = 'none';
            render();
        } catch(e) { console.error(e); }
    }

    function render() {
        const view = document.getElementById('view');
        const footer = document.getElementById('footer');
        const q = workflow[step];
        
        document.getElementById('progress').style.width = ((step / (workflow.length - 1)) * 100) + "%";

        view.innerHTML = `
            <div class="cluster-header">
                <span class="cluster-tag">${q.cluster}</span>
            </div>
            <h2 class="question-title">${q.title}</h2>
            <p class="question-desc">${q.desc}</p>
            <div class="options-list">
                ${q.options.map((o, idx) => {
                    const active = selections[q.id]?.some(s => s.val === o.val);
                    return `
                        <div class="option-item ${active ? 'selected' : ''}" onclick="select('${q.id}', ${idx})">
                            <div class="check-box">
                                ${active ? '<i data-lucide="check" style="width:14px; color:white"></i>' : ''}
                            </div>
                            <span class="option-text">${o.label}</span>
                        </div>
                    `;
                }).join('')}
            </div>
        `;

        footer.innerHTML = `
            ${step > 0 ? `<button class="btn btn-back" onclick="nav(-1)"><i data-lucide="chevron-left"></i></button>` : ''}
            <button class="btn btn-next" onclick="nav(1)">
                ${step === workflow.length - 1 ? 'Analizi Başlat' : 'Sonraki'}
                <i data-lucide="${step === workflow.length - 1 ? 'activity' : 'chevron-right'}"></i>
            </button>
        `;
        lucide.createIcons();
    }

    function select(qId, idx) {
        const opt = workflow.find(w => w.id === qId).options[idx];
        if (!selections[qId]) selections[qId] = [];
        const exists = selections[qId].findIndex(s => s.val === opt.val);
        if (exists > -1) selections[qId].splice(exists, 1);
        else selections[qId].push(opt);
        render();
    }

    function nav(dir) {
        if (dir === 1 && step === workflow.length - 1) calculate();
        else { step += dir; render(); }
    }

    function calculate() {
        const view = document.getElementById('view');
        const footer = document.getElementById('footer');
        
        const userItems = Object.values(selections).flat();
        let results = [];

        allRecords.forEach(rec => {
            let score = 0;
            let matchingTags = [];
            const flatText = JSON.stringify(rec).toLowerCase();

            userItems.forEach(u => {
                // Sütun bazlı tam eşleşme (Yüksek Puan)
                const colVal = String(rec[u.key] || "").toLowerCase();
                if (colVal.includes(u.val.toLowerCase())) {
                    score += 25;
                    matchingTags.push(u.label);
                } 
                // Global metin araması (Düşük Puan)
                else if (flatText.includes(u.val.toLowerCase())) {
                    score += 10;
                    if (!matchingTags.includes(u.label)) matchingTags.push(u.label);
                }
            });

            if (score > 10) results.push({ ...rec, score, matchingTags });
        });

        results.sort((a, b) => b.score - a.score);

        view.innerHTML = `
            <h2 class="question-title">Ayırıcı Tanılar</h2>
            <p class="question-desc">Seçilen kriterlere en yakın eşleşmeler:</p>
            ${results.length ? results.slice(0, 8).map(r => `
                <div class="result-card">
                    <div class="score-badge">%${Math.min(r.score, 100)}</div>
                    <div style="font-weight:900; color:var(--primary); font-size:1.15rem; margin-bottom:4px;">${r["Tanı Adı"]}</div>
                    <div style="font-size:0.7rem; color:var(--text-muted); font-weight:700; text-transform:uppercase; margin-bottom:12px;">${r._source}</div>
                    
                    <div style="font-size:0.85rem; line-height:1.5;">
                        <strong>Klinik:</strong> ${r["Klinik Özellikleri"]?.substring(0, 150)}...
                    </div>

                    ${r["Özel Benzetmesi"] ? `
                        <div class="spot-hint">
                            <i data-lucide="lightbulb" style="width:14px"></i>
                            Spot: ${r["Özel Benzetmesi"]}
                        </div>
                    ` : ''}

                    <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;">
                        ${r.matchingTags.map(t => `<span style="font-size:0.65rem; background:#f1f5f9; padding:4px 8px; border-radius:6px; font-weight:600;">${t}</span>`).join('')}
                    </div>
                </div>
            `).join('') : '<p style="text-align:center; padding:40px; color:gray;">Eşleşme bulunamadı.</p>'}
        `;

        footer.innerHTML = `<button class="btn btn-next" onclick="location.reload()">Yeni Sorgu</button>`;
        lucide.createIcons();
    }

    window.onload = init;
</script>

</body>
</html>
