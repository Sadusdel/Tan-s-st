<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anamnez Tanı Asistanı - Veritabanı Entegre</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-light: #eff6ff;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --radius: 18px;
            --safe-bottom: max(16px, env(safe-area-inset-bottom));
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg);
            margin: 0; 
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        #app-container { 
            width: 100%; 
            max-width: 500px; 
            background: var(--surface);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .progress-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: #f1f5f9; z-index: 50;
        }
        .progress-bar {
            height: 100%; background: var(--primary); width: 0%;
            transition: width 0.4s ease;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            padding-top: calc(30px + env(safe-area-inset-top));
            scrollbar-width: none;
        }

        .header-section { margin-bottom: 1.5rem; }
        .title { font-size: 1.4rem; font-weight: 800; margin: 0 0 8px 0; color: #1e293b; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; line-height: 1.4; }

        .cluster-tag {
            display: inline-block;
            padding: 4px 10px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 30px; }

        .option-card {
            background: #fff;
            border: 2px solid #f1f5f9;
            padding: 16px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .option-card.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .footer-nav {
            padding: 16px 20px;
            padding-bottom: calc(var(--safe-bottom) + 10px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            gap: 10px;
            background: white;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .btn-prev { background: #f1f5f9; color: #475569; flex: 0 0 60px; }
        .btn-next { background: var(--primary); color: white; }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        .result-item {
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            background: #fff;
        }

        #loader {
            position: fixed; inset: 0; background: #fff; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f4f6; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: 600; color: #64748b;">Veritabanı Analiz Ediliyor...</p>
</div>

<div id="app-container">
    <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
    <div id="view-content" class="content-area"></div>
    <div id="nav-footer" class="footer-nav"></div>
</div>

<script>
    let db = null;
    let step = 0;
    let answers = {};
    let allData = [];

    // Veritabanı sütunlarına göre mantıksal kümelendirme
    const workflow = [
        {
            id: "demografik",
            cluster: "Küme 1: Hasta Profili",
            title: "Demografik Bilgiler",
            desc: "Yaş ve cinsiyet, epidemiyolojik olarak bazı tanıları ön plana çıkarır.",
            options: [
                { val: "Çocuk", label: "Çocuk/Bebek", key: "Görüldüğü Yaş Aralığı" },
                { val: "Genç", label: "Genç Erişkin", key: "Görüldüğü Yaş Aralığı" },
                { val: "Erişkin", label: "Erişkin/Orta Yaş", key: "Görüldüğü Yaş Aralığı" },
                { val: "Yaşlı", label: "Yaşlı", key: "Görüldüğü Yaş Aralığı" },
                { val: "Erkek", label: "Erkek", key: "Cinsiyet" },
                { val: "Kadın", label: "Kadın", key: "Cinsiyet" }
            ]
        },
        {
            id: "lokalizasyon",
            cluster: "Küme 2: Bölgesel Dağılım",
            title: "Lezyonun Yeri",
            desc: "Lezyon en belirgin olarak nerede izleniyor?",
            options: [
                { val: "Dil", label: "Dil / Dil Dorsumu", key: "Lokalizasyon" },
                { val: "Damak", label: "Damak (Sert/Yumuşak)", key: "Lokalizasyon" },
                { val: "Dudak", label: "Dudak Mukozası/Vermilyon", key: "Lokalizasyon" },
                { val: "Dişeti", label: "Gingiva / Dişeti", key: "Lokalizasyon" },
                { val: "Yanak", label: "Bukkal Mukoza", key: "Lokalizasyon" },
                { val: "Taban", label: "Ağız Tabanı", key: "Lokalizasyon" }
            ]
        },
        {
            id: "semptom",
            cluster: "Küme 3: Subjektif Bulgular",
            title: "Temel Şikayetler",
            desc: "Hastanın ifade ettiği birincil semptom nedir?",
            options: [
                { val: "Asemptomatik", label: "Semptom Yok / Tesadüfi", key: "Semptomları" },
                { val: "Ağrı", label: "Ağrılı / Hassas", key: "Semptomları" },
                { val: "Yava", label: "Yavaş Büyüyen Kitle", key: "Semptomları" },
                { val: "Kanam", label: "Kanama Eğilimi", key: "Semptomları" },
                { val: "Uyuş", label: "Parestezi / Uyuşukluk", key: "Semptomları" }
            ]
        },
        {
            id: "klinik",
            cluster: "Küme 4: Objektif Muayene",
            title: "Klinik Görünüm",
            desc: "Lezyonun fiziksel karakteristiği nasıl?",
            options: [
                { val: "Beyaz", label: "Beyaz / Keratotik", key: "Klinik Özellikleri" },
                { val: "Ülser", label: "Ülserasyon / Erozyon", key: "Klinik Özellikleri" },
                { val: "Ekzofitik", label: "Ekzofitik / Karnabahar", key: "Klinik Özellikleri" },
                { val: "Vezikül", label: "Vezikül / Bül", key: "Klinik Özellikleri" },
                { val: "Pigment", label: "Pigmente / Renkli", key: "Klinik Özellikleri" }
            ]
        }
    ];

    async function setup() {
        try {
            const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
            
            // Gerçek DB dosyasını fetch et
            const response = await fetch('TANISIST..db');
            const buf = await response.arrayBuffer();
            db = new SQL.Database(new Uint8Array(buf));

            // Tüm tabloları birleştirip genel bir havuz oluştur (Örnek: Kırmızı Lezyonlar, Beyaz Lezyonlar vb.)
            const tables = ["Kırmızı Lezyonlar", "Yumuşak Doku Kistleri", "Beyaz Lezyonlar"]; 
            // Not: Gerçek DB'de tablo isimleri farklı olabilir, SQL ile dinamik çekilebilir.
            
            tables.forEach(t => {
                try {
                    const res = db.exec(`SELECT * FROM "${t}"`);
                    if(res.length) {
                        const cols = res[0].columns;
                        res[0].values.forEach(row => {
                            let obj = {};
                            cols.forEach((c, i) => obj[c] = row[i]);
                            allData.push(obj);
                        });
                    }
                } catch(e) { console.log(t + " tablosu atlandı."); }
            });

            document.getElementById('loader').style.display = 'none';
            render();
        } catch (err) {
            console.error(err);
            // Fallback: DB bulunamazsa boş başlat
            document.getElementById('loader').innerHTML = "<p>DB Dosyası Yüklenemedi.</p>";
        }
    }

    function render() {
        const container = document.getElementById('view-content');
        const footer = document.getElementById('nav-footer');
        const q = workflow[step];
        
        document.getElementById('p-bar').style.width = ((step / workflow.length) * 100) + "%";

        container.innerHTML = `
            <div class="fade-in">
                <span class="cluster-tag">${q.cluster}</span>
                <div class="header-section">
                    <h2 class="title">${q.title}</h2>
                    <p class="subtitle">${q.desc}</p>
                </div>
                <div class="options-grid">
                    ${q.options.map((opt, i) => {
                        const sel = answers[q.id]?.some(a => a.val === opt.val);
                        return `
                            <div class="option-card ${sel ? 'selected' : ''}" onclick="toggle('${q.id}', ${i})">
                                <i data-lucide="${sel ? 'check-circle' : 'circle'}" style="width:20px; height:20px;"></i>
                                ${opt.label}
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `;

        footer.innerHTML = `
            ${step > 0 ? `<button class="btn btn-prev" onclick="move(-1)"><i data-lucide="arrow-left"></i></button>` : ''}
            <button class="btn btn-next" onclick="move(1)" ${!answers[q.id]?.length ? 'disabled' : ''}>
                ${step === workflow.length - 1 ? 'Analizi Başlat' : 'Sonraki Adım'}
            </button>
        `;
        lucide.createIcons();
        container.scrollTo(0,0);
    }

    function toggle(qId, idx) {
        const opt = workflow.find(q => q.id === qId).options[idx];
        if (!answers[qId]) answers[qId] = [];
        const i = answers[qId].findIndex(a => a.val === opt.val);
        if (i > -1) answers[qId].splice(i, 1);
        else answers[qId].push(opt);
        render();
    }

    function move(dir) {
        if (dir === 1 && step === workflow.length - 1) finish();
        else { step += dir; render(); }
    }

    function finish() {
        document.getElementById('p-bar').style.width = "100%";
        const container = document.getElementById('view-content');
        const footer = document.getElementById('nav-footer');
        
        container.innerHTML = `
            <div class="header-section">
                <h2 class="title">Diferansiyel Tanı Listesi</h2>
                <p class="subtitle">Seçilen klinik parametrelere göre veritabanı eşleşmeleri:</p>
            </div>
            <div id="results-list"></div>
        `;

        const userSelection = Object.values(answers).flat();
        let scores = [];

        allData.forEach(item => {
            let score = 0;
            let matchedCriteria = [];
            
            userSelection.forEach(ans => {
                const dbValue = String(item[ans.key] || "").toLowerCase();
                const searchValue = ans.val.toLowerCase();
                
                if (dbValue.includes(searchValue)) {
                    score += 25; // Eşleşme ağırlığı
                    matchedCriteria.push(ans.label);
                }
            });

            if (score > 0) {
                scores.push({ ...item, totalScore: score, matchedCriteria });
            }
        });

        scores.sort((a, b) => b.totalScore - a.totalScore);
        const list = document.getElementById('results-list');

        if(scores.length === 0) {
            list.innerHTML = `<p style="text-align:center; color:gray; margin-top:40px;">Eşleşen tanı bulunamadı. Lütfen kriterleri genişletin.</p>`;
        } else {
            scores.slice(0, 8).forEach(s => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div style="font-weight:800; color:var(--primary); font-size:1.1rem; flex:1;">${s["Tanı Adı"] || 'Bilinmeyen Tanı'}</div>
                        <div style="background:var(--primary-light); color:var(--primary); font-size:0.7rem; padding:2px 8px; border-radius:10px; font-weight:900;">%${Math.min(s.totalScore, 100)} UYUM</div>
                    </div>
                    <div style="font-size:0.85rem; color:#64748b; margin:8px 0;">${s["Klinik Özellikleri"]?.substring(0, 100)}...</div>
                    <div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:8px;">
                        ${s.matchedCriteria.map(c => `<span style="font-size:0.65rem; background:#f1f5f9; padding:2px 6px; border-radius:4px;">${c}</span>`).join('')}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        footer.innerHTML = `<button class="btn btn-next" onclick="location.reload()">Başa Dön</button>`;
        lucide.createIcons();
    }

    window.onload = setup;
</script>

</body>
</html>
