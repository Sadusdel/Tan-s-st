<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Klinik Tanı Analizörü</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #334155;
            --radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #app-wrapper {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: var(--card);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .header {
            padding: 20px;
            background: var(--primary);
            color: white;
            text-align: center;
        }

        .header h1 { margin: 0; font-size: 1.25rem; }

        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            width: 100%;
        }

        .progress-inner {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .category-badge {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .question-desc {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 24px;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 16px;
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover { border-color: #cbd5e1; background: #f1f5f9; }
        .option-btn.selected {
            border-color: var(--accent);
            background: #eff6ff;
            color: var(--accent);
        }

        .footer {
            padding: 16px 24px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
        }

        .btn-primary { background: var(--accent); color: white; flex: 2; }
        .btn-secondary { background: #f1f5f9; color: #475569; flex: 1; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Sonuç Ekranı */
        .result-card {
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
        }

        .match-pct {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .result-title { font-size: 1.15rem; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
        .result-group { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 12px; }
        .result-info { font-size: 0.85rem; line-height: 1.5; color: #475569; }

        .spot-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #fff7ed;
            color: #9a3412;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 10px;
            border: 1px solid #ffedd5;
        }

        #loading-screen {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f1f5f9; border-top-color: var(--accent); border-radius: 50%; animation: rot 1s infinite linear; }
        @keyframes rot { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-weight:600;">Analiz Modülleri Yükleniyor...</p>
</div>

<div id="app-wrapper">
    <div class="header"><h1>KLİNİK TANI ANALİZÖRÜ</h1></div>
    <div class="progress-bar"><div class="progress-inner" id="progress"></div></div>
    
    <div id="main-content" class="content"></div>
    
    <div id="footer" class="footer"></div>
</div>

<script>
    let db = null;
    let step = 0;
    let userAnswers = {};
    let allData = [];

    // Sağladığınız anahtar kelime setine göre organize edilmiş soru akışı
    const questions = [
        {
            id: "demografik",
            cat: "Profil",
            title: "Hasta Demografisi",
            desc: "Belirli patolojiler belirli yaş gruplarında kümelenir.",
            options: [
                { val: "Çocuk", label: "Çocuk / Adölesan (10-20)", key: "Görüldüğü Yaş Aralığı" },
                { val: "Genç", label: "Genç Erişkin (20-40)", key: "Görüldüğü Yaş Aralığı" },
                { val: "Erişkin", label: "Orta Yaş (40-60)", key: "Görüldüğü Yaş Aralığı" },
                { val: "Yaşlı", label: "Yaşlı (50+)", key: "Görüldüğü Yaş Aralığı" },
                { val: "Kadın", label: "Kadın", key: "Cinsiyet" },
                { val: "Erkek", label: "Erkek", key: "Cinsiyet" }
            ]
        },
        {
            id: "etiyoloji",
            cat: "Etiyoloji",
            title: "Olası Tetikleyiciler",
            desc: "Lezyonun başlangıcına neden olan faktörler nelerdir?",
            options: [
                { val: "Tütün", label: "Tütün / Alkol / Kronik İrritasyon", key: "Etiyolojisi" },
                { val: "Protez", label: "Protez Vuruğu / Travma", key: "Etiyolojisi" },
                { val: "Enfeksiyon", label: "Enfeksiyon (Candida/HPV/HSV)", key: "Etiyolojisi" },
                { val: "Genetik", label: "Genetik (KRT Mutasyonu/Ailevi)", key: "Etiyolojisi" },
                { val: "Hormonal", label: "Sistemik/Hormonal (PTH/Tiroid)", key: "Etiyolojisi" },
                { val: "Vitamin", label: "Vitamin Eksikliği", key: "Etiyolojisi" }
            ]
        },
        {
            id: "semptom",
            cat: "Semptomlar",
            title: "Hasta Şikayetleri",
            desc: "Subjektif bulgular ve duyusal değişimler.",
            options: [
                { val: "Ağrı", label: "Ağrı (Nevraljik/Yanma)", key: "SemptomlarÄ±" },
                { val: "Ağrısız", label: "Ağrısız Şişlik", key: "SemptomlarÄ±" },
                { val: "Tat", label: "Metalik Tat Bozukluğu", key: "SemptomlarÄ±" },
                { val: "Disfaji", label: "Yutma Güçlüğü / Disfaji", key: "SemptomlarÄ±" },
                { val: "Kanama", label: "Spontan Kanama", key: "SemptomlarÄ±" },
                { val: "Halsizlik", label: "Halsizlik / Genel Belirtiler", key: "SemptomlarÄ±" }
            ]
        },
        {
            id: "lokalizasyon",
            cat: "Konum",
            title: "Lezyonun Bölgesi",
            desc: "Anatomik yerleşim ayırıcı tanıda en büyük filtredir.",
            options: [
                { val: "Bukkal", label: "Bukkal Mukoza / Yanak", key: "Lokalizasyon" },
                { val: "Dil", label: "Dil (Lateral/Ventral/Dorsum)", key: "Lokalizasyon" },
                { val: "Damak", label: "Sert / Yumuşak Damak", key: "Lokalizasyon" },
                { val: "Dişeti", label: "Dişeti (Gingiva)", key: "Lokalizasyon" },
                { val: "Taban", label: "Ağız Tabanı / Orta Hat", key: "Lokalizasyon" },
                { val: "Mandibula", label: "Mandibula Posterior / Ramus", key: "Lokalizasyon" },
                { val: "Maksilla", label: "Maksilla Anterior", key: "Lokalizasyon" }
            ]
        },
        {
            id: "klinik",
            cat: "Klinik Bulgular",
            title: "Muayene Özellikleri",
            desc: "Objektif görünüm ve doku karakteri.",
            options: [
                { val: "Kazınabilen", label: "Kazınabilen Beyaz Plaklar", key: "Klinik Ã–zellikleri" },
                { val: "Kazınamayan", label: "Kazınamayan / Sabit Plaklar", key: "Klinik Ã–zellikleri" },
                { val: "Süt kesiği", label: "Süt Kesiği Görünümü", key: "Klinik Ã–zellikleri" },
                { val: "Kadifemsi", label: "Kadifemsi / Kırmızı Yüzey", key: "Klinik Ã–zellikleri" },
                { val: "Hamur", label: "Hamur Kıvamında / Fikse Kitle", key: "Klinik Ã–zellikleri" },
                { val: "Krut", label: "Kanlı Krutlar (Dudakta)", key: "Klinik Ã–zellikleri" },
                { val: "Pus", label: "Pus (İrin) Çıkışı", key: "Klinik Ã–zellikleri" }
            ]
        },
        {
            id: "radyoloji",
            cat: "Radyoloji",
            title: "Görüntüleme Bulguları",
            desc: "Teknik görüntü özellikleri.",
            options: [
                { val: "Multiloküler", label: "Multiloküler Radyolüsensi", key: "Radyolojik GÃ¶rÃ¼ntÃ¼ Ã–zellikleri" },
                { val: "Güve", label: "Güve Yeniği Görünümü", key: "Radyolojik GÃ¶rÃ¼ntÃ¼ Ã–zellikleri" },
                { val: "Scalloping", label: "Scalloping (Kök Arası Uzanım)", key: "Radyolojik GÃ¶rÃ¼ntÃ¼ Ã–zellikleri" },
                { val: "Opak", label: "Radyoopak Kalsifikasyonlar", key: "Radyolojik GÃ¶rÃ¼ntÃ¼ Ã–zellikleri" },
                { val: "Dura", label: "Lamina Dura Kaybı", key: "Radyolojik GÃ¶rÃ¼ntÃ¼ Ã–zellikleri" },
                { val: "Sekestr", label: "Sekestr (Ölü Kemik)", key: "Radyolojik GÃ¶rÃ¼ntÃ¼ Ã–zellikleri" }
            ]
        },
        {
            id: "benzetme",
            cat: "Spot Tanı",
            title: "Özel Benzetmeler",
            desc: "Karakteristik 'Spot' bilgiler.",
            options: [
                { val: "Kar fırtınası", label: "Kar Fırtınası (Driven Snow)", key: "Ã–zel Benzetmesi" },
                { val: "Sabun köpüğü", label: "Sabun Köpüğü / Bal Peteği", key: "Ã–zel Benzetmesi" },
                { val: "Soğan zarı", label: "Soğan Zarı Görünümü", key: "Ã–zel Benzetmesi" },
                { val: "İnci", label: "İnci Tanesi (Epstein)", key: "Ã–zel Benzetmesi" },
                { val: "Hedef", label: "Hedef Tahtası (Bulls-eye)", key: "Ã–zel Benzetmesi" },
                { val: "Double Chin", label: "Çift Çene (Double Chin)", key: "Ã–zel Benzetmesi" }
            ]
        }
    ];

    async function initDB() {
        try {
            const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
            const response = await fetch('TANISIST..db');
            const buf = await response.arrayBuffer();
            db = new SQL.Database(new Uint8Array(buf));

            const tables = ["KÄ±rmÄ±zÄ± Lezyonlar", "YumuÅŸak Doku Kistleri", "Beyaz Lezyonlar", "Kemik Patolojileri", "TÃ¼kÃ¼rÃ¼k Bezi Patolojileri"];
            
            tables.forEach(t => {
                try {
                    const res = db.exec(`SELECT * FROM "${t}"`);
                    if(res.length) {
                        const cols = res[0].columns;
                        res[0].values.forEach(row => {
                            let obj = { _tbl: t };
                            cols.forEach((c, i) => obj[c] = row[i]);
                            allData.push(obj);
                        });
                    }
                } catch(e) {}
            });

            document.getElementById('loading-screen').style.display = 'none';
            render();
        } catch(e) {
            console.error(e);
            document.getElementById('loading-screen').innerHTML = "Veritabanı bağlantı hatası.";
        }
    }

    function render() {
        const q = questions[step];
        const container = document.getElementById('main-content');
        const footer = document.getElementById('footer');
        
        document.getElementById('progress').style.width = ((step / questions.length) * 100) + "%";

        container.innerHTML = `
            <span class="category-badge">${q.cat}</span>
            <div class="question-text">${q.title}</div>
            <div class="question-desc">${q.desc}</div>
            <div class="options-grid">
                ${q.options.map((opt, i) => {
                    const sel = userAnswers[q.id]?.some(a => a.val === opt.val);
                    return `
                        <button class="option-btn ${sel ? 'selected' : ''}" onclick="toggleSelect('${q.id}', ${i})">
                            <i data-lucide="${sel ? 'check-square' : 'square'}" style="width:20px;"></i>
                            ${opt.label}
                        </button>
                    `;
                }).join('')}
            </div>
        `;

        footer.innerHTML = `
            <button class="btn btn-secondary" onclick="move(-1)" ${step === 0 ? 'disabled' : ''}><i data-lucide="arrow-left"></i> Geri</button>
            <button class="btn btn-primary" onclick="move(1)" ${!userAnswers[q.id]?.length ? 'disabled' : ''}>
                ${step === questions.length - 1 ? 'Analiz Et' : 'Devam Et'} <i data-lucide="arrow-right"></i>
            </button>
        `;
        lucide.createIcons();
    }

    function toggleSelect(qid, idx) {
        const opt = questions.find(q => q.id === qid).options[idx];
        if(!userAnswers[qid]) userAnswers[qid] = [];
        const exists = userAnswers[qid].findIndex(a => a.val === opt.val);
        if(exists > -1) userAnswers[qid].splice(exists, 1);
        else userAnswers[qid].push(opt);
        render();
    }

    function move(dir) {
        if(step + dir >= questions.length) showResults();
        else { step += dir; render(); }
    }

    function showResults() {
        const container = document.getElementById('main-content');
        const footer = document.getElementById('footer');
        document.getElementById('progress').style.width = "100%";

        const selectedList = Object.values(userAnswers).flat();
        let scores = [];

        allData.forEach(item => {
            let score = 0;
            let matchedKeys = [];
            const raw = JSON.stringify(item).toLowerCase();

            selectedList.forEach(user => {
                const cellVal = String(item[user.key] || "").toLowerCase();
                const search = user.val.toLowerCase();

                // 1. Doğrudan Sütun Eşleşmesi (En yüksek puan)
                if(cellVal.includes(search)) {
                    score += 30;
                    matchedKeys.push(user.label);
                } 
                // 2. Satır İçi Genel Eşleşme (Bonus puan)
                else if(raw.includes(search)) {
                    score += 10;
                    if(!matchedKeys.includes(user.label)) matchedKeys.push(user.label);
                }
            });

            if(score > 15) {
                scores.push({ ...item, score, matchedKeys });
            }
        });

        scores.sort((a,b) => b.score - a.score);

        container.innerHTML = `
            <div class="question-text">Analiz Sonuçları</div>
            <p class="question-desc">Anahtar kelimeler ve spot bilgilerle en çok örtüşen tanılar:</p>
            ${scores.length ? scores.slice(0, 10).map(s => `
                <div class="result-card">
                    <div class="match-pct">%${Math.min(s.score, 100)} Uyum</div>
                    <div class="result-title">${s["TanÄ± AdÄ±"]}</div>
                    <div class="result-group">${s._tbl}</div>
                    <div class="result-info">
                        <strong>Klinik:</strong> ${s["Klinik Ã–zellikleri"]?.substring(0, 140)}...
                    </div>
                    ${s["Ã–zel Benzetmesi"] ? `
                        <div class="spot-tag">
                            <i data-lucide="zap" style="width:12px;"></i>
                            Spot: ${s["Ã–zel Benzetmesi"]}
                        </div>
                    ` : ''}
                    <div style="margin-top:12px; display:flex; flex-wrap:wrap; gap:5px;">
                        ${s.matchedKeys.map(m => `<span style="font-size:0.65rem; background:#f1f5f9; padding:2px 6px; border-radius:4px;">${m}</span>`).join('')}
                    </div>
                </div>
            `).join('') : '<p>Seçilen kriterlere uygun tanı bulunamadı.</p>'}
        `;

        footer.innerHTML = `<button class="btn btn-primary" style="width:100%;" onclick="location.reload()">Yeni Analiz</button>`;
        lucide.createIcons();
    }

    window.onload = initDB;
</script>

</body>
</html>
