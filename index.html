<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anamnez Tanı Asistanı - Pro Versiyon</title>
    <!-- Modern UI Icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-light: #eff6ff;
            --secondary: #64748b;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg);
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        #app-container { 
            width: 100%; 
            height: 100%;
            max-width: 500px; 
            background: var(--surface);
            position: relative; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 768px) {
            #app-container {
                height: 85vh;
                border-radius: 24px;
                border: 1px solid #e2e8f0;
            }
        }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            padding-top: calc(24px + env(safe-area-inset-top));
            display: flex;
            flex-direction: column;
            scrollbar-width: none;
        }
        .content-area::-webkit-scrollbar { display: none; }

        .header-section { text-align: left; margin-bottom: 2rem; }
        .title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; color: #0f172a; margin: 0 0 8px 0; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; }

        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 10px; 
            margin-bottom: 20px;
        }

        .option-card {
            background: #fff;
            border: 2px solid #e2e8f0;
            padding: 16px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .option-card:hover { border-color: var(--primary); background: var(--primary-light); }

        .option-card.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }

        .checkbox {
            width: 20px; height: 20px;
            border-radius: 6px;
            border: 2px solid #cbd5e1;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .selected .checkbox { border-color: white; background: white; color: var(--primary); }

        .footer-nav {
            background: var(--surface);
            padding: 16px 24px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-prev { background: #f1f5f9; color: #475569; max-width: 80px; }
        .btn-next { background: var(--primary); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn:active:not(:disabled) { transform: scale(0.97); }

        .progress-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: #f1f5f9; z-index: 50;
        }
        .progress-bar {
            height: 100%; background: var(--primary); width: 0%;
            transition: width 0.3s ease;
        }

        /* Result Styles */
        .diag-card {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        .diag-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .diag-name { font-weight: 800; font-size: 1.1rem; color: #0f172a; flex: 1; padding-right: 10px; }
        .score-badge {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 0.75rem;
        }
        .match-bar {
            height: 4px; background: #f1f5f9; border-radius: 2px; margin-bottom: 15px;
        }
        .match-fill { height: 100%; background: var(--primary); border-radius: 2px; }
        
        .spec-item { margin-top: 8px; font-size: 0.85rem; }
        .spec-label { font-weight: 700; color: var(--text-muted); text-transform: uppercase; font-size: 0.65rem; display: block; margin-bottom: 2px; }
        .spec-val { color: var(--text-main); line-height: 1.4; }

        #loader {
            position: fixed; inset: 0; background: #fff; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 48px; height: 48px; border: 5px solid #f1f5f9; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top: 20px; font-weight: 600; color: var(--secondary);">Veritabanı Hazırlanıyor...</p>
</div>

<div id="app-container">
    <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
    <div id="view-content" class="content-area"></div>
    <div id="nav-footer" class="footer-nav"></div>
</div>

<script>
    let db = null;
    let step = 0;
    let answers = {};

    const workflow = [
        {
            id: "demografik",
            title: "Demografik Veriler",
            desc: "Hastanın yaş grubu ve cinsiyeti ayırıcı tanıda kritik öneme sahiptir.",
            options: [
                { val: "Çocuk", label: "0-15 Yaş (Pediatrik)", key: "Yaş", weight: 30 },
                { val: "Genç", label: "16-30 Yaş (Genç Erişkin)", key: "Yaş", weight: 30 },
                { val: "Orta", label: "31-55 Yaş (Erişkin)", key: "Yaş", weight: 30 },
                { val: "Yaşlı", label: "55+ Yaş (Geriatrik)", key: "Yaş", weight: 30 },
                { val: "Kadın", label: "Kadın Hasta", key: "Cinsiyet", weight: 20 },
                { val: "Erkek", label: "Erkek Hasta", key: "Cinsiyet", weight: 20 }
            ]
        },
        {
            id: "lokalizasyon",
            title: "Anatomik Bölge",
            desc: "Lezyonun primer çıkış noktasını seçiniz.",
            options: [
                { val: "Mandibula", label: "Mandibula (Alt Çene)", key: "Lokalizasyon", weight: 40 },
                { val: "Maksilla", label: "Maksilla (Üst Çene)", key: "Lokalizasyon", weight: 40 },
                { val: "Dil", label: "Dil / Dil Kökü", key: "Lokalizasyon", weight: 50 },
                { val: "Damak", label: "Sert / Yumuşak Damak", key: "Lokalizasyon", weight: 50 },
                { val: "Yanak", label: "Bukkal Mukoza", key: "Lokalizasyon", weight: 40 },
                { val: "Dişeti", label: "Gingival Dokular", key: "Lokalizasyon", weight: 45 }
            ]
        },
        {
            id: "semptom",
            title: "Klinik Semptomlar",
            desc: "Hastanın subjektif şikayetlerini tanımlayınız.",
            options: [
                { val: "Ağrı", label: "Şiddetli / Hafif Ağrı", key: "Semptom", weight: 50 },
                { val: "Kanama", label: "Kanama Eğilimi", key: "Semptom", weight: 45 },
                { val: "Parestezi", label: "Uyuşukluk (Parestezi)", key: "Semptom", weight: 70 },
                { val: "Asemptomatik", label: "Belirti Yok (Asemptomatik)", key: "Semptom", weight: 20 }
            ]
        },
        {
            id: "radyo",
            title: "Görüntüleme Bulguları",
            desc: "Radyografik incelemede baskın olan patern.",
            options: [
                { val: "Uniloküler", label: "Uniloküler Radyolüsensi", key: "Radyoloji", weight: 60 },
                { val: "Multiloküler", label: "Multiloküler (Sabun Köpüğü)", key: "Radyoloji", weight: 80 },
                { val: "Opak", label: "Radyoopak / Mikst Görüntü", key: "Radyoloji", weight: 65 },
                { val: "Sınırları Belirsiz", label: "İnvaziv / Güve Yediği", key: "Radyoloji", weight: 85 }
            ]
        }
    ];

    async function setupDB() {
        const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
        db = new SQL.Database();
        
        // Örnek klinik veritabanı oluşturma
        db.run(`
            CREATE TABLE Odontojenik_Tumorler (isim, yas, cinsiyet, lokalizasyon, semptom, radyoloji, ozellik);
            INSERT INTO Odontojenik_Tumorler VALUES 
            ('Ameloblastoma', 'Genç, Orta', 'Erkek, Kadın', 'Mandibula', 'Ağrı, Parestezi', 'Multiloküler', 'Agresif ekspansiyon gösterir.'),
            ('Odontojenik Keratokist', 'Genç, Orta', 'Erkek', 'Mandibula', 'Asemptomatik', 'Uniloküler, Multiloküler', 'Lümende keratin mevcuttur.'),
            ('Dentijerous Kist', 'Genç', 'Erkek, Kadın', 'Mandibula, Maksilla', 'Asemptomatik', 'Uniloküler', 'Gömülü diş kronunu çevreler.'),
            ('Osteosarkom', 'Orta, Yaşlı', 'Erkek', 'Mandibula', 'Ağrı, Parestezi', 'Sınırları Belirsiz, Opak', 'Güneş ışını manzarası izlenebilir.'),
            ('Skuamöz Hücreli Karsinom', 'Yaşlı', 'Erkek', 'Dil, Damak', 'Ağrı, Kanama', 'Sınırları Belirsiz', 'Mukoza ülserasyonu ile seyreder.');
        `);

        // Gerçek veritabanını yüklemeyi dene (Opsiyonel)
        try {
            const resp = await fetch("TANISIST..db");
            if (resp.ok) {
                const buf = await resp.arrayBuffer();
                db = new SQL.Database(new Uint8Array(buf));
            }
        } catch(e) { console.log("Yerel DB yüklenemedi, demo verileriyle devam ediliyor."); }

        document.getElementById('loader').style.display = 'none';
        render();
    }

    function render() {
        const container = document.getElementById('view-content');
        const footer = document.getElementById('nav-footer');
        const q = workflow[step];
        
        document.getElementById('p-bar').style.width = ((step / workflow.length) * 100) + "%";

        container.innerHTML = `
            <div class="fade-in">
                <div class="header-section">
                    <h2 class="title">${q.title}</h2>
                    <p class="subtitle">${q.desc}</p>
                </div>
                <div class="options-grid">
                    ${q.options.map((opt, i) => {
                        const isSelected = answers[q.id]?.some(a => a.val === opt.val);
                        return `
                            <div class="option-card ${isSelected ? 'selected' : ''}" onclick="toggleOption('${q.id}', ${i})">
                                <div class="checkbox">
                                    ${isSelected ? '<i data-lucide="check" style="width:14px;height:14px"></i>' : ''}
                                </div>
                                ${opt.label}
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `;

        footer.innerHTML = `
            ${step > 0 ? `<button class="btn btn-prev" onclick="move(-1)"><i data-lucide="chevron-left"></i></button>` : ''}
            <button class="btn btn-next" onclick="move(1)" ${!answers[q.id]?.length ? 'disabled' : ''}>
                ${step === workflow.length - 1 ? 'Analizi Tamamla' : 'Devam Et'} 
                ${step === workflow.length - 1 ? '' : '<i data-lucide="arrow-right"></i>'}
            </button>
        `;
        
        lucide.createIcons();
    }

    function toggleOption(qId, idx) {
        const opt = workflow.find(q => q.id === qId).options[idx];
        if (!answers[qId]) answers[qId] = [];
        
        const exists = answers[qId].findIndex(a => a.val === opt.val);
        if (exists > -1) answers[qId].splice(exists, 1);
        else answers[qId].push(opt);
        
        render();
    }

    function move(dir) {
        if (dir === 1 && step === workflow.length - 1) showResults();
        else { step += dir; render(); }
    }

    function showResults() {
        document.getElementById('p-bar').style.width = "100%";
        const container = document.getElementById('view-content');
        const footer = document.getElementById('nav-footer');
        
        container.innerHTML = `
            <div class="header-section">
                <h2 class="title">Analiz Sonuçları</h2>
                <p class="subtitle">Belirttiğiniz verilere göre en olası patolojik tablolar aşağıda listelenmiştir.</p>
            </div>
            <div id="results-list"></div>
        `;

        const tables = db.exec("SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'");
        let scoredMatches = [];
        let flatUserSelections = Object.values(answers).flat();

        tables[0].values.forEach(tRow => {
            const tableName = tRow[0];
            const meta = db.exec(`PRAGMA table_info('${tableName}')`)[0].values.map(c => c[1]);
            const rows = db.exec(`SELECT * FROM "${tableName}"`);

            if (rows.length > 0) {
                rows[0].values.forEach(data => {
                    let totalScore = 0;
                    let matchesFound = [];

                    flatUserSelections.forEach(userAns => {
                        // Basit akıllı eşleştirme logic
                        const colIdx = meta.findIndex(c => c.toLowerCase().includes(userAns.key.toLowerCase().substring(0,3)));
                        if (colIdx !== -1) {
                            const dbVal = String(data[colIdx]).toLowerCase();
                            if (dbVal.includes(userAns.val.toLowerCase())) {
                                totalScore += userAns.weight;
                                matchesFound.push(userAns.val);
                            }
                        }
                    });

                    if (totalScore > 0) {
                        scoredMatches.push({
                            name: data[0],
                            score: totalScore,
                            fullData: data,
                            headers: meta,
                            group: tableName.replace(/_/g, ' ')
                        });
                    }
                });
            }
        });

        const list = document.getElementById('results-list');
        // Skora göre sırala ve normalize et
        scoredMatches.sort((a,b) => b.score - a.score).slice(0, 8).forEach(match => {
            const perc = Math.min(Math.round((match.score / 220) * 100), 99);
            const card = document.createElement('div');
            card.className = 'diag-card fade-in';
            
            let specs = "";
            match.headers.forEach((h, i) => {
                if (i > 0 && i < 6 && match.fullData[i] && match.fullData[i] !== "YOKTUR") {
                    specs += `
                        <div class="spec-item">
                            <span class="spec-label">${h}</span>
                            <span class="spec-val">${match.fullData[i]}</span>
                        </div>
                    `;
                }
            });

            card.innerHTML = `
                <div class="diag-header">
                    <div class="diag-name">${match.name}</div>
                    <div class="score-badge">%${perc} Uyum</div>
                </div>
                <div class="match-bar"><div class="match-fill" style="width: ${perc}%"></div></div>
                <div style="font-size: 0.7rem; color: var(--primary); font-weight: 800; margin-bottom: 12px;">GRUP: ${match.group}</div>
                ${specs}
            `;
            list.appendChild(card);
        });

        footer.innerHTML = `<button class="btn btn-next" onclick="location.reload()">Yeni Sorgu Başlat</button>`;
    }

    window.onload = setupDB;
</script>

</body>
</html>
